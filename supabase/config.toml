# Supabase CLI project config. Docs: https://supabase.com/docs/guides/cli/config
project_id = "corp-management"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true

# Invite-only: public sign-up disabled (accounts created via the invite route).
[auth.email]
enable_signup = false
enable_confirmations = true
